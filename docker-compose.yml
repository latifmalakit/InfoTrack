services:
  api:
    build:
      context: ./backend
      dockerfile: InfoTrack.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ForwardedProxy__Enabled: "true"
      ForwardedProxy__KnownNetworks__0: 172.16.0.0/12
    ports:
      - "5080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - api
    ports:
      - "8080:80"
